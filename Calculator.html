<!DOCTYPE html>
<!--
  ============================================================
  CALCULATOR PROJECT
  BCA Portfolio Project #1
  
  Features:
  - Basic operations: +, -, ×, ÷
  - Percentage, decimal support
  - Keyboard support
  - Calculation history (uses STACK data structure!)
  - Fully responsive
  
  Data Structure used: STACK — history ke liye
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator — BCA Project</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Space Grotesk', sans-serif;
      padding: 20px;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(99,102,241,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 70%, rgba(236,72,153,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Main wrapper ── */
    .wrapper {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    /* ── Calculator body ── */
    .calculator {
      width: 340px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 40px 80px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    /* ── Display area ── */
    .display {
      padding: 28px 28px 20px;
      background: #0a0a0a;
      border-bottom: 1px solid #1e1e1e;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
    }

    .display-expr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #444;
      letter-spacing: 0.5px;
      min-height: 20px;
      text-align: right;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display-main {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 300;
      color: #f0f0f0;
      text-align: right;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.1s;
    }

    .display-main.has-result {
      color: #818cf8;
    }

    /* ── Buttons grid ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1a1a1a;
      padding: 1px;
    }

    /* Base button */
    .btn {
      padding: 0;
      height: 72px;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.12s, transform 0.08s;
      position: relative;
      overflow: hidden;
      outline: none;
      user-select: none;
    }

    /* Ripple effect */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .btn:active::after { opacity: 1; }
    .btn:active { transform: scale(0.95); }

    /* Number buttons */
    .btn-num {
      background: #1c1c1c;
      color: #e0e0e0;
    }
    .btn-num:hover { background: #242424; }

    /* Operator buttons */
    .btn-op {
      background: #1e1e2e;
      color: #818cf8;
      font-size: 22px;
      font-weight: 500;
    }
    .btn-op:hover { background: #252538; }
    .btn-op.active-op {
      background: #818cf8;
      color: #fff;
    }

    /* Function buttons (AC, +/-, %) */
    .btn-fn {
      background: #1e1e1e;
      color: #888;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .btn-fn:hover { background: #262626; }

    /* Equals button */
    .btn-eq {
      background: linear-gradient(135deg, #818cf8, #6366f1);
      color: #fff;
      font-size: 26px;
      font-weight: 300;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }
    .btn-eq:hover {
      background: linear-gradient(135deg, #9ea3fb, #818cf8);
      box-shadow: 0 4px 28px rgba(99,102,241,0.45);
    }

    /* Zero spans 2 cols */
    .btn-zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 28px;
      font-size: 18px;
    }

    /* ── History panel ── */
    .history-panel {
      width: 220px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.4);
    }

    .history-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .history-clear {
      font-size: 10px;
      color: #333;
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .history-clear:hover { color: #818cf8; }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 400px;
      overflow-y: auto;
    }
    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    .history-item {
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .history-item:hover {
      background: #1e1e1e;
      border-color: #2a2a2a;
    }
    .history-expr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #444;
      margin-bottom: 3px;
    }
    .history-result {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 400;
      color: #818cf8;
    }

    .history-empty {
      font-size: 12px;
      color: #2a2a2a;
      text-align: center;
      padding: 30px 0;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Keyboard hint */
    .keyboard-hint {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #1e1e1e;
      font-size: 11px;
      color: #2a2a2a;
      line-height: 1.8;
      font-family: 'JetBrains Mono', monospace;
    }
    .keyboard-hint span { color: #444; }

    @media (max-width: 620px) {
      .wrapper { flex-direction: column; align-items: center; }
      .history-panel { width: 340px; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- ── Calculator ── -->
  <div class="calculator">

    <!-- Display -->
    <div class="display">
      <div class="display-expr" id="expr"></div>
      <div class="display-main" id="display">0</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">

      <!-- Row 1: Functions -->
      <button class="btn btn-fn" onclick="clearAll()">AC</button>
      <button class="btn btn-fn" onclick="toggleSign()">+/−</button>
      <button class="btn btn-fn" onclick="percent()">%</button>
      <button class="btn btn-op" id="op-/" onclick="setOperator('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn btn-num" onclick="inputNum('7')">7</button>
      <button class="btn btn-num" onclick="inputNum('8')">8</button>
      <button class="btn btn-num" onclick="inputNum('9')">9</button>
      <button class="btn btn-op" id="op-*" onclick="setOperator('*')">×</button>

      <!-- Row 3 -->
      <button class="btn btn-num" onclick="inputNum('4')">4</button>
      <button class="btn btn-num" onclick="inputNum('5')">5</button>
      <button class="btn btn-num" onclick="inputNum('6')">6</button>
      <button class="btn btn-op" id="op--" onclick="setOperator('-')">−</button>

      <!-- Row 4 -->
      <button class="btn btn-num" onclick="inputNum('1')">1</button>
      <button class="btn btn-num" onclick="inputNum('2')">2</button>
      <button class="btn btn-num" onclick="inputNum('3')">3</button>
      <button class="btn btn-op" id="op-+" onclick="setOperator('+')">+</button>

      <!-- Row 5 -->
      <button class="btn btn-num btn-zero" onclick="inputNum('0')">0</button>
      <button class="btn btn-num" onclick="inputDot()">.</button>
      <button class="btn btn-eq" onclick="calculate()">=</button>

    </div>
  </div>

  <!-- ── History Panel ── -->
  <div class="history-panel">
    <div class="history-title">
      History
      <button class="history-clear" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">no history yet</div>
    </div>
    <div class="keyboard-hint">
      <span>Keyboard shortcuts:</span><br/>
      0–9 → numbers<br/>
      + - * / → operators<br/>
      Enter → equals<br/>
      Esc → clear<br/>
      Backspace → delete
    </div>
  </div>

</div>


<script>
  /* ═══════════════════════════════════════
     DATA STRUCTURE: STACK
     History store karne ke liye
     LIFO — Last In, First Out
     ═══════════════════════════════════════ */
  const historyStack = [];   // Stack

  function pushHistory(expr, result) {
    historyStack.push({ expr, result });   // Stack push
    renderHistory();
  }

  function clearHistory() {
    historyStack.length = 0;               // Stack clear
    renderHistory();
  }

  function renderHistory() {
    const list  = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');

    if (historyStack.length === 0) {
      list.innerHTML = '<div class="history-empty" id="historyEmpty">no history yet</div>';
      return;
    }

    // Show newest first — Stack reverse traverse
    list.innerHTML = [...historyStack].reverse().map((item, i) => `
      <div class="history-item" onclick="useHistory('${item.result}')">
        <div class="history-expr">${item.expr}</div>
        <div class="history-result">${item.result}</div>
      </div>`).join('');
  }

  function useHistory(val) {
    currentVal = val;
    justCalculated = true;
    updateDisplay(val);
  }


  /* ═══════════════════════════════════════
     CALCULATOR STATE — Variables
     ═══════════════════════════════════════ */
  let currentVal      = '0';   // display pe jo dikhta hai
  let storedVal       = null;  // pehla number
  let operator        = null;  // +, -, *, /
  let justCalculated  = false; // = press hua tha?
  let waitingForNext  = false; // operator press hua, ab naya number chahiye
  let expression      = '';    // upar wali line

  const displayEl = document.getElementById('display');
  const exprEl    = document.getElementById('expr');


  /* ═══════════════════════════════════════
     DISPLAY UPDATE
     ═══════════════════════════════════════ */
  function updateDisplay(val) {
    // Agar number bahut lamba ho to font chhota karo
    displayEl.style.fontSize = val.length > 10 ? '1.6rem' : '';
    displayEl.textContent = val;
    displayEl.className = 'display-main' + (justCalculated ? ' has-result' : '');
  }

  function updateExpr(text) {
    exprEl.textContent = text;
  }


  /* ═══════════════════════════════════════
     NUMBER INPUT
     ═══════════════════════════════════════ */
  function inputNum(num) {
    if (justCalculated) {
      // = ke baad naya number — sab reset karo
      currentVal = num;
      justCalculated = false;
      operator = null;
      storedVal = null;
      waitingForNext = false;
      updateExpr('');
    } else if (waitingForNext) {
      // Operator press hua tha — naya number shuru karo
      currentVal = num;
      waitingForNext = false;
    } else if (currentVal === '0') {
      currentVal = num;
    } else {
      if (currentVal.length >= 12) return; // max length
      currentVal += num;
    }
    updateDisplay(currentVal);
    clearActiveOp();
  }


  /* ═══════════════════════════════════════
     DECIMAL POINT
     ═══════════════════════════════════════ */
  function inputDot() {
    if (justCalculated || waitingForNext) {
      currentVal = '0.';
      justCalculated = false;
      waitingForNext = false;
    } else if (!currentVal.includes('.')) {
      currentVal += '.';
    }
    updateDisplay(currentVal);
  }


  /* ═══════════════════════════════════════
     SET OPERATOR (+, -, *, /)
     ═══════════════════════════════════════ */
  function setOperator(op) {
    if (operator && !justCalculated && !waitingForNext) {
      // Chain calculation — pehle calculate karo
      calculate(true);
    }
    storedVal      = parseFloat(currentVal);
    operator       = op;
    justCalculated = false;
    waitingForNext = true;  // ← next number input pe replace hoga, append nahi

    const opSymbol = { '+':'+', '-':'−', '*':'×', '/':'÷' }[op];
    updateExpr(storedVal + ' ' + opSymbol);

    // Active operator highlight
    clearActiveOp();
    document.getElementById('op-' + op)?.classList.add('active-op');
  }

  function clearActiveOp() {
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
  }


  /* ═══════════════════════════════════════
     CALCULATE (=)
     ═══════════════════════════════════════ */
  function calculate(chain = false) {
    if (operator === null || storedVal === null) return;

    const a   = storedVal;
    const b   = parseFloat(currentVal);
    const sym = { '+':'+', '-':'−', '*':'×', '/':'÷' }[operator];
    const expr = `${a} ${sym} ${b}`;

    let result;
    switch (operator) {
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/':
        if (b === 0) {
          currentVal = 'Error';
          updateDisplay('Error');
          updateExpr('Cannot divide by 0');
          operator = null; storedVal = null;
          return;
        }
        result = a / b;
        break;
    }

    // Round to avoid floating point weirdness (0.1 + 0.2 = 0.3 not 0.30000000004)
    result = parseFloat(result.toFixed(10));

    const resultStr = String(result);

    if (!chain) {
      updateExpr(expr + ' =');
      pushHistory(expr, resultStr);  // Stack mein push karo
      justCalculated = true;
    }

    currentVal = resultStr;
    operator   = null;
    storedVal  = chain ? result : null;
    waitingForNext = false;
    updateDisplay(resultStr);
    clearActiveOp();
  }


  /* ═══════════════════════════════════════
     UTILITY FUNCTIONS
     ═══════════════════════════════════════ */

  // AC — sab clear karo
  function clearAll() {
    currentVal     = '0';
    storedVal      = null;
    operator       = null;
    justCalculated = false;
    waitingForNext = false;
    expression     = '';
    updateDisplay('0');
    updateExpr('');
    clearActiveOp();
  }

  // +/- — sign toggle karo
  function toggleSign() {
    if (currentVal === '0' || currentVal === 'Error') return;
    currentVal = currentVal.startsWith('-')
      ? currentVal.slice(1)
      : '-' + currentVal;
    updateDisplay(currentVal);
  }

  // % — percentage
  function percent() {
    const val = parseFloat(currentVal);
    if (isNaN(val)) return;
    currentVal = String(val / 100);
    updateDisplay(currentVal);
  }


  /* ═══════════════════════════════════════
     KEYBOARD SUPPORT
     ═══════════════════════════════════════ */
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNum(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOperator('+');
    else if (e.key === '-') setOperator('-');
    else if (e.key === '*') setOperator('*');
    else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (justCalculated || currentVal === 'Error') { clearAll(); return; }
      currentVal = currentVal.length > 1 ? currentVal.slice(0, -1) : '0';
      updateDisplay(currentVal);
    }
    else if (e.key === '%') percent();
  });
</script>
</body>
</html>
