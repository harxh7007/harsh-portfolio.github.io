<!DOCTYPE html>
<!--
  ============================================================
  STUDENT RESULT SYSTEM — UPGRADED
  BCA Portfolio Project #4

  New Features:
  ✅ Dynamic subjects — add/remove subjects
  ✅ Custom max marks per subject
  ✅ Clear all data button
  ✅ Auto grade & percentage
  ✅ Pass/Fail (33% passing marks)
  ✅ Search by name or roll number
  ✅ localStorage — data saved after refresh

  Data Structures:
  - ARRAY OF OBJECTS — students
  - ARRAY OF OBJECTS — subjects config
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Result System — BCA Project</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:      #f0f4ff;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --primary: #4f46e5;
      --success: #22c55e;
      --danger:  #ef4444;
      --text:    #1e293b;
      --muted:   #94a3b8;
    }
    body { background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--text); min-height: 100vh; padding: 32px 20px; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at 10% 10%, rgba(79,70,229,0.08) 0%, transparent 50%), radial-gradient(ellipse at 90% 90%, rgba(34,197,94,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .wrapper { max-width: 1050px; margin: 0 auto; position: relative; z-index: 1; }

    /* Header */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .page-title { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    .page-title span { color: var(--primary); }
    .header-stats { display: flex; gap: 12px; }
    .hstat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px; text-align: center; min-width: 80px; }
    .hstat-num { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 600; }
    .hstat-num.green { color: var(--success); }
    .hstat-num.red   { color: var(--danger); }
    .hstat-num.blue  { color: var(--primary); }
    .hstat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* Layout */
    .layout { display: grid; grid-template-columns: 380px 1fr; gap: 20px; align-items: start; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }

    /* Mode tabs */
    .mode-tabs { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 18px; }
    .mode-tab { flex: 1; padding: 7px; border: none; background: none; border-radius: 7px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.2s; }
    .mode-tab.active { background: white; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: span 2; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .form-input { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--primary); }
    .form-input::placeholder { color: var(--muted); }

    /* Section divider */
    .section-divider { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; border-top: 1px solid var(--border); padding-top: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .add-subj-btn { background: rgba(79,70,229,0.08); color: var(--primary); border: 1px dashed rgba(79,70,229,0.3); border-radius: 8px; padding: 5px 12px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .add-subj-btn:hover { background: rgba(79,70,229,0.15); }

    /* Subject config row */
    .subj-config-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .subj-name-input { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .subj-name-input:focus { border-color: var(--primary); }
    .subj-max-input { width: 66px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); outline: none; text-align: center; transition: border-color 0.2s; }
    .subj-max-input:focus { border-color: var(--primary); }
    .max-lbl-sm { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .rem-btn { background: none; border: none; color: #e2e8f0; font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: all 0.15s; line-height: 1; }
    .rem-btn:hover { color: var(--danger); background: #fef2f2; }

    /* Marks row */
    .marks-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .subj-lbl { flex: 1; font-size: 13px; font-weight: 500; }
    .marks-input { width: 70px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 10px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text); outline: none; text-align: center; transition: border-color 0.2s; }
    .marks-input:focus { border-color: var(--primary); }
    .out-of-lbl { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; margin-top: 16px; }
    .submit-btn { flex: 1; background: var(--primary); color: white; border: none; border-radius: 12px; padding: 13px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .submit-btn:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,70,229,0.3); }
    .clear-btn { background: rgba(239,68,68,0.08); color: var(--danger); border: 1.5px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 13px 16px; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .clear-btn:hover { background: rgba(239,68,68,0.15); }

    /* Warning note */
    .warn-note { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.7; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 12px; }

    /* Right side */
    .right-side { display: flex; flex-direction: column; gap: 16px; }
    .search-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--primary); }
    .search-input::placeholder { color: var(--muted); }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); background: white; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #f8fafc; border-bottom: 1px solid var(--border); }
    th { padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8faff; }
    td { padding: 12px 14px; vertical-align: middle; }
    .roll-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--primary); font-weight: 600; }
    .student-name { font-weight: 500; }
    .pct-badge { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
    .grade-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }
    .grade-O { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .grade-A { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .grade-B { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }
    .grade-C { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    .grade-D { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
    .grade-F { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .status-pass { display: inline-flex; align-items: center; gap: 4px; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-fail { display: inline-flex; align-items: center; gap: 4px; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .del-btn { background: none; border: none; color: #e2e8f0; font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.15s; }
    .del-btn:hover { color: var(--danger); background: #fef2f2; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; right: 28px; background: #1e293b; color: white; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error   { border-left: 4px solid var(--danger); }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="wrapper">

  <!-- Header -->
  <div class="page-header">
    <h1 class="page-title">Student <span>Result</span> System</h1>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-num blue"  id="statTotal">0</div><div class="hstat-label">Total</div></div>
      <div class="hstat"><div class="hstat-num green" id="statPass">0</div><div class="hstat-label">Pass</div></div>
      <div class="hstat"><div class="hstat-num red"   id="statFail">0</div><div class="hstat-label">Fail</div></div>
    </div>
  </div>

  <div class="layout">

    <!-- LEFT -->
    <div class="card">
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-add"      onclick="switchTab('add')">➕ Add Student</button>
        <button class="mode-tab"        id="tab-subjects"  onclick="switchTab('subjects')">📚 Manage Subjects</button>
      </div>

      <!-- Add Student Panel -->
      <div class="panel active" id="panel-add">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Roll No.</label>
            <input type="text" class="form-input" id="rollNo" placeholder="e.g. BCA001"/>
          </div>
          <div class="form-group">
            <label class="form-label">Student Name</label>
            <input type="text" class="form-input" id="studentName" placeholder="Full name"/>
          </div>
          <div class="form-group full">
            <label class="form-label">Class / Section</label>
            <input type="text" class="form-input" id="className" placeholder="e.g. BCA 2nd Sem"/>
          </div>
        </div>
        <div class="section-divider">📝 Marks</div>
        <div id="marksRows"></div>
        <div class="btn-row">
          <button class="submit-btn" onclick="addStudent()">+ Add Student</button>
          <button class="clear-btn"  onclick="clearAllStudents()">🗑️ Clear All</button>
        </div>
      </div>

      <!-- Manage Subjects Panel -->
      <div class="panel" id="panel-subjects">
        <div class="section-divider">
          Subjects &amp; Max Marks
          <button class="add-subj-btn" onclick="addSubjectRow()">+ Add Subject</button>
        </div>
        <div id="subjectConfigRows"></div>
        <div class="btn-row">
          <button class="submit-btn" onclick="saveSubjects()">✅ Save Subjects</button>
        </div>
        <div class="warn-note">⚠️ Saving new subjects will clear all existing student data.</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-side">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍  Search by name or roll number..." oninput="renderTable()"/>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Roll No.</th><th>Name</th><th>Total</th>
              <th>%</th><th>Grade</th><th>Result</th><th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  /* ═══════════════════════════
     DATA
     ═══════════════════════════ */
  let subjectsConfig = [
    { name: 'Mathematics',      max: 100 },
    { name: 'English',          max: 100 },
    { name: 'Computer Science', max: 100 },
    { name: 'Physics',          max: 100 },
    { name: 'Data Structures',  max: 100 },
  ];
  let studentsArray = [];
  let nextId = 1;

  function loadData() {
    const saved = localStorage.getItem('bca-results-v2');
    if (saved) {
      const d = JSON.parse(saved);
      studentsArray  = d.students || [];
      nextId         = d.nextId   || 1;
      subjectsConfig = d.subjects || subjectsConfig;
    }
  }
  function saveData() {
    localStorage.setItem('bca-results-v2', JSON.stringify({
      students: studentsArray, nextId, subjects: subjectsConfig
    }));
  }

  /* ═══════════════════════════
     TAB SWITCH
     ═══════════════════════════ */
  function switchTab(tab) {
    ['add','subjects'].forEach(t => {
      document.getElementById('tab-'   + t).classList.toggle('active', t === tab);
      document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    });
    if (tab === 'subjects') renderSubjectConfig();
  }

  /* ═══════════════════════════
     SUBJECT CONFIG
     ═══════════════════════════ */
  function renderSubjectConfig() {
    document.getElementById('subjectConfigRows').innerHTML =
      subjectsConfig.map((s, i) => `
        <div class="subj-config-row">
          <input type="text"   class="subj-name-input" id="sname-${i}" value="${s.name}" placeholder="Subject name"/>
          <span class="max-lbl-sm">Max:</span>
          <input type="number" class="subj-max-input"  id="smax-${i}"  value="${s.max}" min="1" max="1000"/>
          ${subjectsConfig.length > 1
            ? `<button class="rem-btn" onclick="removeSubjectRow(${i})">×</button>`
            : `<span style="width:28px"></span>`}
        </div>`).join('');
  }

  function addSubjectRow() {
    subjectsConfig.push({ name: 'New Subject', max: 100 });
    renderSubjectConfig();
  }

  function removeSubjectRow(i) {
    if (subjectsConfig.length <= 1) { showToast('At least 1 subject required!', 'error'); return; }
    subjectsConfig.splice(i, 1);
    renderSubjectConfig();
  }

  function saveSubjects() {
    const updated = subjectsConfig.map((_, i) => ({
      name: document.getElementById('sname-' + i).value.trim() || ('Subject ' + (i+1)),
      max:  parseInt(document.getElementById('smax-'  + i).value) || 100
    }));

    if (studentsArray.length > 0) {
      if (!window.confirm(`This will delete all ${studentsArray.length} student records. Continue?`)) return;
      studentsArray = []; nextId = 1;
    }

    subjectsConfig = updated;
    saveData();
    renderMarksRows();
    renderTable();
    updateStats();
    showToast('✅ Subjects saved!', 'success');
    switchTab('add');
  }

  /* ═══════════════════════════
     MARKS ROWS (dynamic)
     ═══════════════════════════ */
  function renderMarksRows() {
    document.getElementById('marksRows').innerHTML =
      subjectsConfig.map((s, i) => `
        <div class="marks-row">
          <span class="subj-lbl">${s.name}</span>
          <input type="number" class="marks-input" id="m${i}" placeholder="0" min="0" max="${s.max}"/>
          <span class="out-of-lbl">/ ${s.max}</span>
        </div>`).join('');
  }

  /* ═══════════════════════════
     GRADE
     ═══════════════════════════ */
  function calcGrade(pct) {
    if (pct >= 90) return 'O';
    if (pct >= 80) return 'A';
    if (pct >= 70) return 'B';
    if (pct >= 60) return 'C';
    if (pct >= 50) return 'D';
    return 'F';
  }

  /* ═══════════════════════════
     ADD STUDENT
     ═══════════════════════════ */
  function addStudent() {
    const roll = document.getElementById('rollNo').value.trim();
    const name = document.getElementById('studentName').value.trim();
    const cls  = document.getElementById('className').value.trim();
    if (!roll || !name) { showToast('Enter Roll No. and Name!', 'error'); return; }
    if (studentsArray.find(s => s.roll.toLowerCase() === roll.toLowerCase())) {
      showToast(`Roll No. "${roll}" already exists!`, 'error'); return;
    }

    const marks = subjectsConfig.map((s, i) => {
      const v = parseInt(document.getElementById('m' + i).value);
      return isNaN(v) ? 0 : v;
    });

    for (let i = 0; i < marks.length; i++) {
      if (marks[i] < 0 || marks[i] > subjectsConfig[i].max) {
        showToast(`${subjectsConfig[i].name}: marks should be 0–${subjectsConfig[i].max}!`, 'error');
        return;
      }
    }

    const totalMax = subjectsConfig.reduce((s, c) => s + c.max, 0);
    const total    = marks.reduce((s, m) => s + m, 0);
    const pct      = parseFloat(((total / totalMax) * 100).toFixed(2));
    const grade    = calcGrade(pct);
    const passed   = marks.every((m, i) => m >= Math.ceil(subjectsConfig[i].max * 0.33));

    studentsArray.push({ id: nextId++, roll, name, cls, marks, total, totalMax, pct, grade, passed });
    saveData(); clearForm(); renderTable(); updateStats();
    showToast(`✅ ${name} added!`, 'success');
  }

  /* ═══════════════════════════
     DELETE / CLEAR ALL
     ═══════════════════════════ */
  function deleteStudent(id) {
    const s = studentsArray.find(s => s.id === id);
    studentsArray = studentsArray.filter(s => s.id !== id);
    saveData(); renderTable(); updateStats();
    showToast(`🗑️ ${s.name} removed.`, 'error');
  }

  function clearAllStudents() {
    if (studentsArray.length === 0) { showToast('No data to clear!', 'error'); return; }
    if (!window.confirm(`Delete all ${studentsArray.length} student records?`)) return;
    studentsArray = []; nextId = 1;
    saveData(); renderTable(); updateStats();
    showToast('🗑️ All data cleared!', 'error');
  }

  /* ═══════════════════════════
     RENDER TABLE
     ═══════════════════════════ */
  function renderTable() {
    const tbody  = document.getElementById('tableBody');
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = studentsArray;
    if (search) filtered = studentsArray.filter(s =>
      s.name.toLowerCase().includes(search) || s.roll.toLowerCase().includes(search));

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div>${search ? `No student found for "${search}"` : 'No students added yet!'}</div>
        </div></td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(s => `
      <tr>
        <td><span class="roll-num">${s.roll}</span></td>
        <td><div class="student-name">${s.name}</div><div style="font-size:11px;color:var(--muted)">${s.cls||''}</div></td>
        <td><span class="pct-badge">${s.total}/${s.totalMax}</span></td>
        <td><span class="pct-badge" style="color:var(--primary)">${s.pct}%</span></td>
        <td><span class="grade-badge grade-${s.grade}">${s.grade}</span></td>
        <td>${s.passed ? '<span class="status-pass">✓ Pass</span>' : '<span class="status-fail">✗ Fail</span>'}</td>
        <td><button class="del-btn" onclick="deleteStudent(${s.id})">×</button></td>
      </tr>`).join('');
  }

  function updateStats() {
    const t = studentsArray.length;
    const p = studentsArray.filter(s => s.passed).length;
    document.getElementById('statTotal').textContent = t;
    document.getElementById('statPass').textContent  = p;
    document.getElementById('statFail').textContent  = t - p;
  }

  function clearForm() {
    ['rollNo','studentName','className'].forEach(id => document.getElementById(id).value = '');
    subjectsConfig.forEach((_, i) => document.getElementById('m' + i).value = '');
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* ═══════════════════════════
     INIT
     ═══════════════════════════ */
  loadData();
  renderMarksRows();
  renderTable();
  updateStats();
</script>
</body>
</html>
